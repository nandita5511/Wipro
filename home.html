<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            color: white;
            text-align: center;
        }
        /* Navigation Bar */
        .navbar {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: inline-block;
            font-weight: bold;
        }
        .navbar a:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
        }
        /* Centered content */
        .container {
            margin-top: 100px;
            padding: 20px;
        }
        img {
            width: 100px;
            margin-bottom: 10px;
        }
        /* Form Styling */
        form {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
        }
        input {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="#">Contact</a>
    </div>

    <div class="container">
        <!-- Logo -->
        <img src="logo.png" alt="Logo"> <!-- Replace with your actual logo file -->

        <!-- Welcome Message -->
        <h1>Welcome!!</h1>

        <p><h2> NANDITA SINGH<h2></p>
       <p>📧 Email: nandita@example.com</p>

                       
           </div>

</body>
</html>
